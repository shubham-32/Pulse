  <path d="M106 84 q8 -5 16 0" stroke="#23262e" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- eyes -->
  <circle cx="86" cy="93" r="4.2" fill="#1b1d22"/>
  <circle cx="114" cy="93" r="4.2" fill="#1b1d22"/>
  <!-- nose -->
