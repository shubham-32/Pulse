  </defs>
  <rect width="200" height="200" fill="url(#rajeshBg)"/>
  <!-- shoulders / kurta -->
  <path d="M34 200 C34 158 64 144 100 144 C136 144 166 158 166 200 Z" fill="#1f6f7e"/>
  <path d="M100 144 L100 200" stroke="#15525e" stroke-width="2" opacity="0.6"/>
